<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Alertes RDV — La Valentine</title>
<link rel="manifest" href="data:application/json,{
  %22name%22:%22Alertes RDV La Valentine%22,
  %22short_name%22:%22Alertes RDV%22,
  %22start_url%22:%22.%22,
  %22display%22:%22standalone%22,
  %22background_color%22:%22%230D1117%22,
  %22theme_color%22:%22%230D1117%22,
  %22icons%22:[{%22src%22:%22data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%230D1117'/%3E%3Ctext y='.9em' font-size='80'%3E%F0%9F%9A%A8%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22any%22,%22type%22:%22image/svg+xml%22}]
}">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Alertes RDV">
<meta name="theme-color" content="#0D1117">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  :root{--bg:#0D1117;--card:#161B22;--border:#21262D;--green:#3FB950;--red:#F85149;--orange:#D29922;--blue:#58A6FF;--text:#E6EDF3;--muted:#7D8590}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;max-width:480px;margin:0 auto;display:flex;flex-direction:column}
  .header{background:var(--card);border-bottom:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:20}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--muted);flex-shrink:0;transition:background .3s}
  .dot.on{background:var(--green)}
  .header-info{flex:1;min-width:0}
  .header-title{font-weight:800;font-size:15px}
  .header-sub{font-size:11px;color:var(--muted);margin-top:1px}
  .nps-avg-chip{background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0}
  .content{flex:1;padding-bottom:80px}
  .bottom-nav{background:var(--card);border-top:1px solid var(--border);display:flex;position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:20}
  .tab-btn{flex:1;background:none;border:none;border-top:2px solid transparent;cursor:pointer;padding:12px 4px 16px;display:flex;flex-direction:column;align-items:center;gap:4px;color:var(--muted);font-size:11px;font-weight:600}
  .tab-btn.active{border-top-color:var(--green);color:var(--green)}
  .tab-icon{font-size:20px;line-height:1}
  .section{padding:14px 14px 0}
  .section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:10px}
  .badge{border-radius:6px;padding:3px 9px;font-size:11px;font-weight:700;display:inline-block}
  .badge.p{background:#3FB95022;color:var(--green);border:1px solid #3FB95055}
  .badge.pa{background:#D2992222;color:var(--orange);border:1px solid #D2992255}
  .badge.d{background:#F8514922;color:var(--red);border:1px solid #F8514955}
  .input{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:9px 11px;font-size:13px;outline:none}
  .input:focus{border-color:var(--blue)}
  .btn-primary{background:var(--green);color:#0D1117;border:none;border-radius:10px;padding:14px;font-weight:800;font-size:15px;cursor:pointer;width:100%}
  .btn-outline{background:none;border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:9px;font-size:13px;cursor:pointer;width:100%;margin-top:8px}
  .btn-sm{background:none;border:1px solid var(--border);border-radius:6px;color:var(--muted);padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer}
  .btn-sm:hover{border-color:var(--blue);color:var(--blue)}
  .btn-danger-sm{background:none;border:1px solid #F8514944;border-radius:6px;color:var(--red);padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer}
  .planning-row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
  .del-btn{background:none;border:none;color:var(--red);font-size:22px;cursor:pointer;padding:0 2px;line-height:1;flex-shrink:0}
  .planning-btns{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
  .alert-card{border-radius:12px;padding:14px;margin-bottom:10px;background:var(--card);transition:opacity .3s}
  .alert-card.red{border-left:3px solid var(--red);border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
  .alert-card.orange{border-left:3px solid var(--orange);border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
  .alert-card.dismissed{opacity:0.4}
  .alert-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
  .alert-nom{font-weight:800;font-size:15px}
  .alert-heure{color:var(--muted);font-size:12px;margin-top:2px}
  .alert-nps{font-size:13px;color:var(--muted);margin-top:8px}
  .alert-comment{font-size:12px;color:var(--muted);font-style:italic;background:var(--bg);border-radius:6px;padding:7px 9px;margin-top:6px;line-height:1.5}
  .alert-email{font-size:12px;color:var(--blue);margin-top:6px}
  .alert-count{background:var(--red);color:#fff;border-radius:10px;padding:1px 9px;font-size:11px}
  .alert-actions{display:flex;justify-content:flex-end;margin-top:10px}
  .empty-state{text-align:center;color:var(--muted);padding:48px 20px;font-size:14px;line-height:1.6}
  .import-page{padding:32px 16px;display:flex;flex-direction:column;align-items:center;gap:20px}
  .import-box{width:100%;max-width:340px;background:var(--card);border:2px dashed var(--border);border-radius:16px;padding:28px 20px;text-align:center}
  .import-success{background:#3FB95011;border:1px solid #3FB95044;border-radius:10px;padding:12px 14px;font-size:13px;color:var(--green);text-align:center;width:100%;max-width:340px}
  .install-banner{background:linear-gradient(135deg,#161B22,#1a2233);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin:14px;display:flex;align-items:center;gap:12px}
  .install-banner.hidden{display:none}
  .install-icon{font-size:28px;flex-shrink:0}
  .install-text{flex:1}
  .install-title{font-weight:700;font-size:13px}
  .install-sub{font-size:11px;color:var(--muted);margin-top:2px}
  .install-btn{background:var(--green);color:#0D1117;border:none;border-radius:8px;padding:8px 14px;font-weight:800;font-size:12px;cursor:pointer;flex-shrink:0}
  .error-msg{color:var(--red);font-size:12px;margin-top:8px}
  #page-import,#page-alertes{display:none}
  .active-page{display:block!important}
</style>
</head>
<body>

<div class="header">
  <div class="dot" id="dot"></div>
  <div class="header-info">
    <div class="header-title">Alertes RDV — La Valentine</div>
    <div class="header-sub" id="header-sub"></div>
  </div>
  <div class="nps-avg-chip" id="nps-avg-chip" style="display:none"></div>
</div>

<div class="install-banner hidden" id="install-banner">
  <div class="install-icon">📱</div>
  <div class="install-text">
    <div class="install-title">Installer l'app</div>
    <div class="install-sub">Ajouter à l'écran d'accueil</div>
  </div>
  <button class="install-btn" onclick="installApp()">Installer</button>
</div>

<div class="content">

  <!-- PAGE IMPORT -->
  <div id="page-import" class="active-page">
    <div class="import-page">
      <div style="text-align:center">
        <div style="font-size:48px;margin-bottom:10px">📥</div>
        <div style="font-size:20px;font-weight:800">Charger les données NPS</div>
        <div style="font-size:13px;color:var(--muted);margin-top:6px">Téléchargez le fichier depuis Google Sheets</div>
      </div>

      <div class="import-box" id="import-box">
        <div style="font-size:32px;margin-bottom:12px">📂</div>
        <div style="color:var(--muted);font-size:13px;margin-bottom:18px">Appuyez pour sélectionner votre fichier</div>
        <input type="file" id="file-input" accept=".xlsx,.xls" style="display:none">
        <button class="btn-primary" onclick="document.getElementById('file-input').click()">
          Choisir le fichier xlsx
        </button>
        <div id="import-error" class="error-msg"></div>
      </div>

      <div id="import-success" class="import-success" style="display:none"></div>

      <div style="font-size:11px;color:var(--muted);text-align:center;max-width:280px;line-height:1.6">
        🔒 Fichier lu localement — aucune donnée envoyée sur internet
      </div>
    </div>
  </div>

  <!-- PAGE ALERTES -->
  <div id="page-alertes">
    <div class="section" style="padding-top:16px">

      <div class="section-title">Planning du jour</div>
      <div class="card">
        <div id="planning-rows"></div>
        <button class="btn-outline" onclick="addRow()">+ Ajouter un client</button>
        <div class="planning-btns">
          <input type="file" id="planning-file-input" accept=".xlsx,.xls,.csv" style="display:none">
          <button class="btn-sm" onclick="document.getElementById('planning-file-input').click()">📅 Importer planning</button>
          <button class="btn-danger-sm" onclick="clearPlanning()">🗑 Effacer tout</button>
        </div>
        <div id="planning-import-error" class="error-msg"></div>
      </div>

      <div class="section-title" id="alertes-title">
        Alertes détracteurs &amp; passifs
      </div>
      <div id="alertes-list"></div>

    </div>
  </div>

</div>

<nav class="bottom-nav">
  <button class="tab-btn" onclick="showTab('alertes')" id="tab-alertes">
    <span class="tab-icon">🚨</span>Alertes
  </button>
  <button class="tab-btn active" onclick="showTab('import')" id="tab-import">
    <span class="tab-icon">📥</span>Import NPS
  </button>
</nav>

<script>
let clients = [];
let planning = [{heure:'',nom:''}];
let dismissed = new Set();
let _alertes = [];

// ── INIT ─────────────────────────────────────────────────────
(function init() {
  try {
    const sc = localStorage.getItem('nps_clients');
    if (sc) clients = JSON.parse(sc).map(c => ({...c, date: c.date ? new Date(c.date) : null}));
  } catch(e) {}
  try {
    const sp = localStorage.getItem('nps_planning');
    if (sp) planning = JSON.parse(sp);
  } catch(e) {}
  try {
    const sd = sessionStorage.getItem('nps_dismissed');
    if (sd) dismissed = new Set(JSON.parse(sd));
  } catch(e) {}

  if (clients.length) {
    document.getElementById('dot').classList.add('on');
    document.getElementById('header-sub').textContent = clients.length + ' réponses';
    document.getElementById('import-box').style.display = 'none';
    document.getElementById('import-success').style.display = 'block';
    document.getElementById('import-success').innerHTML =
      '✅ ' + clients.length + ' réponses chargées<br><span style="color:var(--muted);font-size:11px">Données restaurées</span>';
    refreshPlanning();
    renderAlertes();
    showTab('alertes');
  }
})();

// ── SAVE ─────────────────────────────────────────────────────
function saveClients() {
  try { localStorage.setItem('nps_clients', JSON.stringify(clients)); } catch(e) {}
}
function savePlanning() {
  try { localStorage.setItem('nps_planning', JSON.stringify(planning)); } catch(e) {}
}
function saveDismissed() {
  try { sessionStorage.setItem('nps_dismissed', JSON.stringify([...dismissed])); } catch(e) {}
}

// ── IMPORT NPS ───────────────────────────────────────────────
document.getElementById('file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('import-error').textContent = '';
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const wb = XLSX.read(ev.target.result, {type:'array', cellDates:true});
      const sheet = wb.Sheets['📥 Import'];
      if (!sheet) throw new Error("Feuille '📥 Import' introuvable");

      // Détecte automatiquement la ligne d'en-tête (cherche NPS + Nom)
      const sr = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
      let hRow = 3;
      for (let r = sr.s.r; r <= Math.min(sr.e.r, 10); r++) {
        const vals = [];
        for (let c = sr.s.c; c <= Math.min(sr.e.c, 15); c++) {
          const cell = sheet[XLSX.utils.encode_cell({r, c})];
          if (cell && cell.v != null) vals.push(String(cell.v).trim());
        }
        if (vals.some(v => /^nps$/i.test(v)) && vals.some(v => /nom|email/i.test(v))) {
          hRow = r; break;
        }
      }

      const rows = XLSX.utils.sheet_to_json(sheet, {range: hRow, defval:''});
      if (!rows.length) throw new Error("Aucune donnée trouvée");

      // Détecte les colonnes par leur nom réel
      const keys = Object.keys(rows[0]);
      const npsKey   = keys.find(k => /^nps$/i.test(k.trim()));
      const nomKey   = keys.find(k => /nom.*client/i.test(k) || k.includes('👤')) || keys.find(k => /^nom/i.test(k));
      const emailKey = keys.find(k => /email/i.test(k) || k.includes('📧'));
      const comKey   = keys.find(k => /comment/i.test(k));
      const dateKey  = keys.find(k => /^date$/i.test(k.trim()));
      if (!npsKey) throw new Error("Colonne NPS introuvable dans l'onglet Import");
      if (!nomKey) throw new Error("Colonne Nom Client introuvable dans l'onglet Import");

      clients = rows.filter(r => r[nomKey] && String(r[nomKey]).trim() && r[npsKey] !== '').map(r => {
        const nps = parseFloat(r[npsKey]);
        let d = r[dateKey];
        // Convertit serial Excel en Date JS si nécessaire
        if (typeof d === 'number') d = new Date((d - 25569) * 86400000);
        else if (!(d instanceof Date)) d = d ? new Date(d) : null;
        return {
          nom: String(r[nomKey]).trim().toUpperCase(),
          email: r[emailKey] || '',
          nps, comment: r[comKey] || '',
          date: d && !isNaN(d.getTime()) ? d : null,
          segment: nps>=9 ? 'Promoteur' : nps>=7 ? 'Passif' : 'Détracteur'
        };
      }).filter(r => !isNaN(r.nps) && r.nps >= 0 && r.nps <= 10);
      if (!clients.length) throw new Error("Aucune donnée trouvée");

      const alertSheet = wb.Sheets['🚨 Alertes RDV'];
      if (alertSheet) {
        const planRows = XLSX.utils.sheet_to_json(alertSheet, {header:['_','heure','nom'], range:5, defval:''});
        const loaded = planRows.filter(r => r.nom && String(r.nom).trim())
          .map(r => ({heure: fmtTime(r.heure), nom: String(r.nom).trim().toUpperCase()}));
        if (loaded.length) { planning = loaded; savePlanning(); }
      }

      saveClients();
      document.getElementById('dot').classList.add('on');
      document.getElementById('header-sub').textContent = clients.length + ' réponses';
      document.getElementById('import-box').style.display = 'none';
      document.getElementById('import-success').style.display = 'block';
      document.getElementById('import-success').innerHTML =
        '✅ ' + clients.length + ' réponses chargées<br><span style="color:var(--muted);font-size:11px">Onglet Alertes prêt</span>';
      refreshPlanning();
      renderAlertes();
      showTab('alertes');
    } catch(e) {
      document.getElementById('import-error').textContent = '⚠ ' + e.message;
    }
  };
  reader.readAsArrayBuffer(file);
});

// ── IMPORT PLANNING ──────────────────────────────────────────
document.getElementById('planning-file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  this.value = '';
  const err = document.getElementById('planning-import-error');
  err.textContent = '';
  const ext = file.name.split('.').pop().toLowerCase();

  if (ext === 'csv') {
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const lines = ev.target.result.split(/\r?\n/).filter(l => l.trim());
        const parsed = [];
        for (const line of lines) {
          const parts = line.split(/[,;]/).map(s => s.trim().replace(/^"|"$/g,''));
          if (!parts[0] || /^(heure|nom|time|name)/i.test(parts[0])) continue;
          if (parts.length >= 2) {
            const isTime = /^\d{1,2}[h:]\d{2}$/.test(parts[0]);
            parsed.push({heure: isTime ? parts[0] : '', nom: (isTime ? parts[1] : parts[0]).toUpperCase()});
          } else if (parts[0]) {
            parsed.push({heure:'', nom: parts[0].toUpperCase()});
          }
        }
        if (!parsed.length) throw new Error("Aucun client trouvé");
        planning = parsed;
        savePlanning();
        refreshPlanning();
        renderAlertes();
      } catch(e) { err.textContent = '⚠ ' + e.message; }
    };
    reader.readAsText(file, 'UTF-8');
  } else {
    const reader = new FileReader();
    reader.onload = function(ev) {
      try {
        const wb = XLSX.read(ev.target.result, {type:'array'});
        const sheet = wb.Sheets[wb.SheetNames[0]];

        // Cherche la ligne d'en-tête contenant "Heure" et "Nom"/"Client"
        const sr = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
        let headerRowIdx = -1;
        for (let r = sr.s.r; r <= Math.min(sr.e.r, 25); r++) {
          const vals = [];
          for (let c = sr.s.c; c <= Math.min(sr.e.c, 10); c++) {
            const cell = sheet[XLSX.utils.encode_cell({r, c})];
            if (cell && cell.v != null) vals.push(String(cell.v).toLowerCase().trim());
          }
          if (vals.some(v => /^heure/.test(v)) && vals.some(v => /nom|client/.test(v))) {
            headerRowIdx = r;
            break;
          }
        }
        if (headerRowIdx === -1) throw new Error("En-têtes 'Heure' et 'Nom Client' introuvables");

        const rows = XLSX.utils.sheet_to_json(sheet, {range: headerRowIdx, defval:''});
        if (!rows.length) throw new Error("Aucune donnée trouvée");
        const keys = Object.keys(rows[0]);
        const hKey = keys.find(k => /heure|time/i.test(k)) || keys[0];
        const nKey = keys.find(k => /nom|name|client/i.test(k)) || keys[1] || keys[0];
        const parsed = rows.filter(r => r[nKey] && String(r[nKey]).trim()).map(r => ({
          heure: fmtTime(r[hKey]),
          nom: String(r[nKey]).trim().toUpperCase()
        }));
        if (!parsed.length) throw new Error("Aucun client trouvé");
        planning = parsed;
        savePlanning();
        refreshPlanning();
        renderAlertes();
      } catch(e) { err.textContent = '⚠ ' + e.message; }
    };
    reader.readAsArrayBuffer(file);
  }
});

// Convertit fraction-jour Excel ou string en "HH:MM"
function fmtTime(val) {
  if (typeof val === 'number' && val > 0 && val < 1) {
    const mins = Math.round(val * 1440);
    return String(Math.floor(mins/60)).padStart(2,'0') + ':' + String(mins%60).padStart(2,'0');
  }
  return String(val||'').trim();
}

// ── TABS ─────────────────────────────────────────────────────
function showTab(name) {
  ['alertes','import'].forEach(n => {
    document.getElementById('page-'+n).classList.remove('active-page');
    document.getElementById('tab-'+n).classList.remove('active');
  });
  document.getElementById('page-'+name).classList.add('active-page');
  document.getElementById('tab-'+name).classList.add('active');
  document.querySelector('.content').scrollTop = 0;
}

// ── PLANNING ─────────────────────────────────────────────────
function refreshPlanning() {
  document.getElementById('planning-rows').innerHTML = planning.map((r,i) => `
    <div class="planning-row">
      <input class="input" value="${esc(r.heure)}" placeholder="08:00"
        oninput="planning[${i}].heure=this.value;savePlanning()"
        style="width:64px;flex-shrink:0">
      <input class="input" value="${esc(r.nom)}" placeholder="NOM CLIENT"
        oninput="planning[${i}].nom=this.value.toUpperCase();this.value=this.value.toUpperCase();savePlanning();debounce()"
        style="flex:1;text-transform:uppercase">
      <button class="del-btn" onclick="removeRow(${i})">×</button>
    </div>`).join('');
}

let _t;
function debounce(){clearTimeout(_t);_t=setTimeout(renderAlertes,300);}
function addRow(){planning.push({heure:'',nom:''});savePlanning();refreshPlanning();}
function removeRow(i){planning.splice(i,1);if(!planning.length)planning.push({heure:'',nom:''});savePlanning();refreshPlanning();renderAlertes();}
function clearPlanning(){
  if(!confirm('Effacer tout le planning du jour ?')) return;
  planning=[{heure:'',nom:''}];
  dismissed.clear();
  savePlanning();saveDismissed();
  refreshPlanning();renderAlertes();
}

// ── NOM MATCHING ─────────────────────────────────────────────
function norm(s){
  return String(s).normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^A-Z0-9 ]/gi,'').toUpperCase().trim();
}
function matchName(clientNom, searchNom) {
  const cn = norm(clientNom), sn = norm(searchNom);
  if (cn === sn) return true;
  if (cn.includes(sn) || sn.includes(cn)) return true;
  const cw = cn.split(/\s+/).filter(w => w.length >= 3);
  const sw = sn.split(/\s+/).filter(w => w.length >= 3);
  return sw.some(s => cw.some(c => c === s || c.startsWith(s) || s.startsWith(c)));
}

// ── ALERTES ──────────────────────────────────────────────────
function renderAlertes() {
  _alertes = planning.filter(p => p.nom.trim()).map(p => {
    const nom = p.nom.trim();
    const matches = clients.filter(c => matchName(c.nom, nom));
    const emails = [...new Set(matches.map(m => m.email).filter(Boolean))];
    const isHomo = emails.length > 1;
    const hit = matches.find(c => c.segment !== 'Promoteur');
    return {key: nom+'|'+p.heure, heure: p.heure, nom, isHomo, hit};
  }).filter(a => a.isHomo || a.hit);

  updateNpsAvg();

  const visible = _alertes.filter(a => !dismissed.has(a.key)).length;
  document.getElementById('alertes-title').innerHTML =
    'Alertes détracteurs &amp; passifs' + (visible ? ' <span class="alert-count">'+visible+'</span>' : '');

  if (!_alertes.length) {
    document.getElementById('alertes-list').innerHTML = '<div class="empty-state">'
      + (!clients.length
        ? '📥 Importez d\'abord le fichier NPS'
        : !planning.filter(p => p.nom.trim()).length
          ? 'Saisissez les clients du planning'
          : '✅ Aucun détracteur ni passif<br>dans le planning du jour')
      + '</div>';
    return;
  }

  document.getElementById('alertes-list').innerHTML = _alertes.map((a, i) => {
    const isDone = dismissed.has(a.key);
    const col = a.isHomo ? 'orange' : 'red';
    const seg = a.hit ? (a.hit.segment === 'Passif' ? 'pa' : 'd') : '';
    return '<div class="alert-card ' + col + (isDone ? ' dismissed' : '') + '">'
      + '<div class="alert-header">'
        + '<div>'
          + '<div class="alert-nom">' + esc(a.nom) + '</div>'
          + (a.heure ? '<div class="alert-heure">⏰ ' + esc(a.heure) + '</div>' : '')
        + '</div>'
        + (a.isHomo
          ? '<span style="color:var(--orange);font-size:12px;font-weight:700">⚠ Homonymes</span>'
          : '<span class="badge ' + seg + '">' + a.hit.segment + '</span>')
      + '</div>'
      + (!a.isHomo && a.hit
        ? '<div class="alert-nps">NPS <b style="font-size:16px;color:' + (a.hit.nps<7?'#F85149':'#D29922') + '">' + a.hit.nps + '/10</b>'
          + (a.hit.date ? ' · ' + a.hit.date.toLocaleDateString('fr-FR') : '') + '</div>'
          + (a.hit.comment ? '<div class="alert-comment">"' + esc(a.hit.comment.slice(0,160)) + (a.hit.comment.length>160?'…':'') + '"</div>' : '')
          + (a.hit.email ? '<div class="alert-email">📧 ' + esc(a.hit.email) + '</div>' : '')
        : '')
      + '<div class="alert-actions">'
        + '<button class="btn-sm" onclick="toggleDismiss(' + i + ')">' + (isDone ? '↩ Restaurer' : '✓ Vu') + '</button>'
      + '</div>'
      + '</div>';
  }).join('');
}

function toggleDismiss(i) {
  const key = _alertes[i].key;
  if (dismissed.has(key)) dismissed.delete(key); else dismissed.add(key);
  saveDismissed();
  renderAlertes();
}

// ── NPS MOYENNE DU JOUR ──────────────────────────────────────
function updateNpsAvg() {
  const chip = document.getElementById('nps-avg-chip');
  const names = planning.filter(p => p.nom.trim());
  if (!names.length || !clients.length) { chip.style.display = 'none'; return; }
  const scores = [];
  names.forEach(p => {
    const m = clients.filter(c => matchName(c.nom, p.nom.trim()));
    if (m.length === 1) scores.push(m[0].nps);
  });
  if (!scores.length) { chip.style.display = 'none'; return; }
  const avg = scores.reduce((a,b) => a+b, 0) / scores.length;
  const color = avg>=9 ? 'var(--green)' : avg>=7 ? 'var(--orange)' : 'var(--red)';
  chip.style.display = 'block';
  chip.innerHTML = 'Moy. <b style="color:' + color + '">' + avg.toFixed(1) + '</b>/10';
}

// ── UTILS ─────────────────────────────────────────────────────
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── PWA ──────────────────────────────────────────────────────
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.remove('hidden');
});
function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(() => {
    deferredPrompt = null;
    document.getElementById('install-banner').classList.add('hidden');
  });
}
window.addEventListener('appinstalled', () => {
  document.getElementById('install-banner').classList.add('hidden');
});
</script>
